name: release

# Publish to PyPI on a version tag (e.g. v0.1.0).
# Uses PyPI Trusted Publishing (OIDC) — no API token needed once you register
# this repo as a trusted publisher at https://pypi.org/manage/account/publishing/
# (project: memvault, workflow: release.yml). Falls back to PYPI_API_TOKEN if set.

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Smoke-check the built wheel
        run: |
          python -m pip install dist/*.whl
          memvault --version
          memvault viz --wiki examples/demo --out /tmp/demo.html
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # If you prefer a token instead of trusted publishing, set the
          # PYPI_API_TOKEN secret and uncomment the next line:
          # password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
