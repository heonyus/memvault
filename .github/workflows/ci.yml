name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest -q
      - name: CLI smoke
        run: |
          memvault --version
          memvault viz --wiki examples/demo --out /tmp/demo.html
          memvault export --wiki examples/demo --out /tmp/bundle
          memvault serve --selftest
